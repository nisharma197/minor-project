<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Application Status | Fire NOC System</title>
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
<div class="main-content" id="mainContent">
  <div class="page-content">

    <!-- Status tracker search -->
    <div class="card" style="margin-bottom:20px">
      <div class="card-body">
        <div style="display:flex;gap:12px;align-items:flex-end;flex-wrap:wrap">
          <div style="flex:1;min-width:200px">
            <label class="form-label">Track Application by ID</label>
            <input type="number" class="form-control" id="trackId" placeholder="Enter Application ID">
          </div>
          <button class="btn-primary-custom" onclick="trackApplication()"><i class="fas fa-search"></i> Track</button>
        </div>
      </div>
    </div>

    <!-- Timeline tracker result -->
    <div id="trackResult" style="display:none;margin-bottom:20px">
      <div class="card">
        <div class="card-header">
          <h5><i class="fas fa-map-marker-alt" style="color:#ff6a00;margin-right:8px"></i>Application Status Timeline</h5>
        </div>
        <div class="card-body">
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:24px" id="trackSummary"></div>
          <div class="timeline" id="trackTimeline"></div>
        </div>
      </div>
    </div>

    <!-- All applications -->
    <div class="card">
      <div class="card-header">
        <h5><i class="fas fa-list" style="color:#ff6a00;margin-right:8px"></i>All Applications</h5>
        <div style="display:flex;gap:10px;align-items:center">
          <select class="form-select" id="statusFilter" style="width:auto;padding:8px 12px" onchange="filterByStatus()">
            <option value="">All Status</option>
            <option>Pending</option>
            <option>Under Inspection</option>
            <option>Follow-up Required</option>
            <option>Approved</option>
            <option>Rejected</option>
          </select>
          <input type="text" class="search-input" id="appSearch" placeholder="Search...">
        </div>
      </div>
      <div class="card-body" style="padding:0">
        <div class="table-responsive">
          <table class="data-table" id="appTable">
            <thead><tr><th>#</th><th>Building Name</th><th>Type</th><th>City</th><th>Status</th><th>Priority</th><th>Date</th><th>Action</th></tr></thead>
            <tbody id="appTbody"><tr><td colspan="8" style="text-align:center;padding:30px;color:#999"><i class="fas fa-spinner fa-spin" style="color:#ff6a00"></i> Loading...</td></tr></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="../js/main.js"></script>
<script src="../js/layout.js"></script>
<script>
  const user = getUser();
  if (!user) { window.location.href = 'login.html'; }
  injectLayout(user?.role, 'Application Status');

  let allApps = [];

  async function loadApplications() {
    const res = await apiFetch('/applications');
    if (!res.ok) return;
    allApps = res.data;
    renderTable(allApps);
    filterTable('appSearch', 'appTable');
  }

  function renderTable(data) {
    const tbody = document.getElementById('appTbody');
    if (!data.length) {
      tbody.innerHTML = '<tr><td colspan="8" style="text-align:center;padding:30px;color:#999">No applications found</td></tr>';
      return;
    }
    tbody.innerHTML = data.map(a => `
      <tr>
        <td><strong>#${a.application_id}</strong></td>
        <td>${a.building_name}</td>
        <td>${a.building_type}</td>
        <td>${a.city}</td>
        <td>${statusBadge(a.current_status)}</td>
        <td>${statusBadge(a.priority_level)}</td>
        <td>${fmtDate(a.application_date)}</td>
        <td><button class="btn-icon btn-view" onclick="quickTrack(${a.application_id})" title="Track"><i class="fas fa-map-marker-alt"></i></button></td>
      </tr>`).join('');
  }

  function filterByStatus() {
    const val = document.getElementById('statusFilter').value;
    renderTable(val ? allApps.filter(a => a.current_status === val) : allApps);
  }

  async function trackApplication() {
    const id = document.getElementById('trackId').value;
    if (!id) { showToast('Enter an application ID', 'warning'); return; }
    await quickTrack(parseInt(id));
  }

  async function quickTrack(id) {
    document.getElementById('trackId').value = id;
    const res = await apiFetch('/applications/' + id);
    if (!res.ok) { showToast('Application not found', 'error'); return; }
    const a = res.data;

    // Summary
    document.getElementById('trackSummary').innerHTML = `
      <div><label style="font-size:.72rem;color:#999;text-transform:uppercase">Building</label><div style="font-weight:700;font-size:1.05rem">${a.building_name}</div></div>
      <div><label style="font-size:.72rem;color:#999;text-transform:uppercase">Type</label><div>${a.building_type}</div></div>
      <div><label style="font-size:.72rem;color:#999;text-transform:uppercase">Location</label><div>${a.city}, ${a.state} - ${a.pincode}</div></div>
      <div><label style="font-size:.72rem;color:#999;text-transform:uppercase">Current Status</label><div style="margin-top:4px">${statusBadge(a.current_status)}</div></div>
      <div><label style="font-size:.72rem;color:#999;text-transform:uppercase">Priority</label><div style="margin-top:4px">${statusBadge(a.priority_level)}</div></div>
      <div><label style="font-size:.72rem;color:#999;text-transform:uppercase">Applied On</label><div>${fmtDate(a.application_date)}</div></div>`;

    // Timeline
    const steps = [
      { label:'Application Submitted',  done: true,                                   icon:'fas fa-paper-plane' },
      { label:'Under Review',           done: a.current_status !== 'Pending',          icon:'fas fa-user-check' },
      { label:'Inspection Scheduled',   done: ['Under Inspection','Follow-up Required','Approved','Rejected'].includes(a.current_status), icon:'fas fa-calendar-check' },
      { label:'Inspection Complete',    done: ['Follow-up Required','Approved','Rejected'].includes(a.current_status), icon:'fas fa-search-plus' },
      { label:'NOC Decision',           done: ['Approved','Rejected'].includes(a.current_status), icon:'fas fa-certificate', fail: a.current_status==='Rejected' },
    ];

    document.getElementById('trackTimeline').innerHTML = steps.map(s => `
      <div class="timeline-item">
        <div class="timeline-dot ${s.fail ? 'fail' : s.done ? 'done' : 'wait'}"></div>
        <div class="timeline-content">
          <div class="timeline-title"><i class="${s.icon}" style="color:${s.fail?'#dc3545':s.done?'#28a745':'#aaa'};margin-right:6px"></i>${s.label}</div>
          <div class="timeline-date">${s.done ? (s.fail ? '❌ Rejected' : '✅ Completed') : '⏳ Pending'}</div>
        </div>
      </div>`).join('');

    document.getElementById('trackResult').style.display = 'block';
    document.getElementById('trackResult').scrollIntoView({ behavior:'smooth' });
  }

  loadApplications();
</script>
</body>
</html>
