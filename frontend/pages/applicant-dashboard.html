<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>My Dashboard | Fire NOC System</title>
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
<div class="main-content" id="mainContent">
  <div class="page-content">
    <!-- Welcome -->
    <div style="background:linear-gradient(135deg,#ff6a00,#cc5200);border-radius:16px;padding:24px 28px;color:#fff;margin-bottom:24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:16px">
      <div>
        <h2 style="font-family:'Rajdhani',sans-serif;font-size:1.6rem;margin-bottom:4px">Welcome back, <span id="welcomeName">User</span>! 👋</h2>
        <p style="opacity:.85;font-size:.88rem">Track your NOC applications and stay updated on inspection progress.</p>
      </div>
      <a href="application-form.html" style="background:#fff;color:#ff6a00;padding:10px 22px;border-radius:10px;font-weight:700;font-family:'Rajdhani',sans-serif;font-size:1rem;display:inline-flex;align-items:center;gap:8px">
        <i class="fas fa-plus"></i> New Application
      </a>
    </div>

    <!-- Stats -->
    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:20px;margin-bottom:24px">
      <div class="stat-card"><div class="stat-icon orange"><i class="fas fa-file-alt"></i></div><div><div class="stat-val" id="sTotal">—</div><div class="stat-lbl">Total Applications</div></div></div>
      <div class="stat-card"><div class="stat-icon yellow"><i class="fas fa-clock"></i></div><div><div class="stat-val" id="sPending">—</div><div class="stat-lbl">Pending</div></div></div>
      <div class="stat-card"><div class="stat-icon green"><i class="fas fa-check-circle"></i></div><div><div class="stat-val" id="sApproved">—</div><div class="stat-lbl">Approved</div></div></div>
      <div class="stat-card"><div class="stat-icon red"><i class="fas fa-times-circle"></i></div><div><div class="stat-val" id="sRejected">—</div><div class="stat-lbl">Rejected</div></div></div>
      <div class="stat-card"><div class="stat-icon blue"><i class="fas fa-bell"></i></div><div><div class="stat-val" id="sNotif">—</div><div class="stat-lbl">Unread Alerts</div></div></div>
    </div>

    <!-- My Applications -->
    <div class="card">
      <div class="card-header">
        <h5><i class="fas fa-file-alt" style="color:#ff6a00;margin-right:8px"></i>My Applications</h5>
        <input type="text" class="search-input" id="appSearch" placeholder="Search...">
      </div>
      <div class="card-body" style="padding:0">
        <div class="table-responsive">
          <table class="data-table" id="myAppsTable">
            <thead><tr><th>#</th><th>Building Name</th><th>Type</th><th>City</th><th>Status</th><th>Priority</th><th>Date</th><th>Actions</th></tr></thead>
            <tbody id="myAppsTbody"><tr><td colspan="8" style="text-align:center;padding:30px;color:#999"><i class="fas fa-spinner fa-spin" style="color:#ff6a00"></i> Loading...</td></tr></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- View Application Modal -->
<div class="modal-overlay" id="viewModal">
  <div class="modal-box" style="max-width:600px">
    <div class="modal-header">
      <h5>Application Details</h5>
      <button class="modal-close" onclick="closeModal('viewModal')">&times;</button>
    </div>
    <div class="modal-body" id="viewModalBody"></div>
  </div>
</div>

<script src="../js/main.js"></script>
<script src="../js/layout.js"></script>
<script>
  if (!requireAuth('applicant')) {}
  injectLayout('applicant','My Dashboard');
  const user = getUser();
  document.getElementById('welcomeName').textContent = user?.full_name || 'User';

  async function loadDashboard() {
    const res = await apiFetch('/dashboard/applicant');
    if (!res.ok) return;
    const d = res.data;
    document.getElementById('sTotal').textContent    = d.total_applications;
    document.getElementById('sPending').textContent  = d.pending;
    document.getElementById('sApproved').textContent = d.approved;
    document.getElementById('sRejected').textContent = d.rejected;
    document.getElementById('sNotif').textContent    = d.unread_notifications;
  }

  async function loadMyApplications() {
    const res = await apiFetch('/applications');
    if (!res.ok) return;
    const tbody = document.getElementById('myAppsTbody');
    if (!res.data.length) {
      tbody.innerHTML = `<tr><td colspan="8" style="text-align:center;padding:40px;color:#999">
        <i class="fas fa-folder-open" style="font-size:2rem;color:#ddd;display:block;margin-bottom:10px"></i>
        No applications yet. <a href="application-form.html" style="color:#ff6a00">Submit your first application →</a>
      </td></tr>`;
      return;
    }
    tbody.innerHTML = res.data.map(a => `
      <tr>
        <td>#${a.application_id}</td>
        <td><strong>${a.building_name}</strong></td>
        <td>${a.building_type}</td>
        <td>${a.city}</td>
        <td>${statusBadge(a.current_status)}</td>
        <td>${statusBadge(a.priority_level)}</td>
        <td>${fmtDate(a.application_date)}</td>
        <td>
          <button class="btn-icon btn-view" onclick="viewApp(${a.application_id})"><i class="fas fa-eye"></i></button>
        </td>
      </tr>`).join('');
    filterTable('appSearch','myAppsTable');
  }

  async function viewApp(id) {
    const res = await apiFetch('/applications/'+id);
    if (!res.ok) return;
    const a = res.data;
    document.getElementById('viewModalBody').innerHTML = `
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
        <div><label style="font-size:.75rem;color:#999;text-transform:uppercase">Building</label><div style="font-weight:600">${a.building_name}</div></div>
        <div><label style="font-size:.75rem;color:#999;text-transform:uppercase">Type</label><div>${a.building_type}</div></div>
        <div><label style="font-size:.75rem;color:#999;text-transform:uppercase">City</label><div>${a.city}</div></div>
        <div><label style="font-size:.75rem;color:#999;text-transform:uppercase">State</label><div>${a.state}</div></div>
        <div><label style="font-size:.75rem;color:#999;text-transform:uppercase">Pincode</label><div>${a.pincode}</div></div>
        <div><label style="font-size:.75rem;color:#999;text-transform:uppercase">Priority</label><div>${statusBadge(a.priority_level)}</div></div>
        <div style="grid-column:1/-1"><label style="font-size:.75rem;color:#999;text-transform:uppercase">Address</label><div>${a.address}</div></div>
        <div style="grid-column:1/-1"><label style="font-size:.75rem;color:#999;text-transform:uppercase">Current Status</label><div style="margin-top:4px">${statusBadge(a.current_status)}</div></div>
        ${a.remarks ? `<div style="grid-column:1/-1"><label style="font-size:.75rem;color:#999;text-transform:uppercase">Remarks</label><div style="background:#f8f8f8;border-radius:8px;padding:10px;font-size:.88rem">${a.remarks}</div></div>` : ''}
      </div>
      <div style="margin-top:16px;padding-top:16px;border-top:1px solid #eee">
        <a href="application-status.html" style="color:#ff6a00;font-size:.85rem"><i class="fas fa-arrow-right"></i> View Full Status Timeline</a>
      </div>`;
    openModal('viewModal');
  }

  loadDashboard();
  loadMyApplications();
</script>
</body>
</html>
