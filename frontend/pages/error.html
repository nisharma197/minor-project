<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Error | Fire NOC System</title>
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    body { background:#0d0d0d; display:flex; align-items:center; justify-content:center; min-height:100vh; }
    .error-box { text-align:center; color:#fff; padding:40px 20px; }
    .error-code { font-size:8rem; font-family:'Rajdhani',sans-serif; color:#ff6a00; line-height:1; }
    .error-msg { font-size:1.3rem; margin:12px 0 8px; }
    .error-sub  { font-size:.88rem; color:#888; margin-bottom:28px; }
    .btn-go-home { background:#ff6a00; color:#fff; padding:12px 28px; border-radius:10px; border:none; font-size:1rem; cursor:pointer; text-decoration:none; display:inline-flex; align-items:center; gap:8px; }
    .btn-go-home:hover { background:#cc5200; }
  </style>
</head>
<body>
  <div class="error-box">
    <div class="error-code">404</div>
    <div class="error-msg">🔥 Page Not Found</div>
    <div class="error-sub">The page you're looking for doesn't exist or has been moved.</div>
    <a href="../index.html" class="btn-go-home"><i class="fas fa-home"></i> Go to Home</a>
  </div>
</body>
</html>
